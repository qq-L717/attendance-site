<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>水利计算课程设计考勤对比工具</title>
  <meta name="description" content="水利计算课程设计考勤对比工具：上传每日签到表，自动对比固定总名单，生成出勤统计和考勤 Excel。" />
  <meta name="keywords" content="水利计算课程设计,考勤对比,签到表,出勤统计,Excel考勤" />
  <meta name="author" content="水利计算课程设计考勤工具" />
  <meta name="robots" content="index,follow" />
  <meta property="og:title" content="水利计算课程设计考勤对比工具" />
  <meta property="og:description" content="上传每日签到表，自动对比固定总名单并生成考勤结果。" />
  <meta property="og:type" content="website" />
  <meta name="theme-color" content="#2563eb" />
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
  <style>
    :root{
      --bg:#f5f7fb;--card:#ffffff;--text:#101828;--muted:#667085;--line:#e4e7ec;
      --primary:#2563eb;--primary2:#1d4ed8;--ok:#16a34a;--warn:#f59e0b;--bad:#dc2626;
      --soft:#eff6ff;--shadow:0 20px 60px rgba(15,23,42,.08);--radius:22px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;color:var(--text);background:radial-gradient(circle at top left,#dbeafe 0,#f8fafc 34%,var(--bg) 100%)}
    .wrap{max-width:1180px;margin:0 auto;padding:40px 20px 56px}
    header{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:22px}
    h1{margin:0;font-size:32px;letter-spacing:-.03em;line-height:1.15}
    p{margin:8px 0 0;color:var(--muted);line-height:1.7}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:9px 14px;border-radius:999px;background:#eaf1ff;color:#1d4ed8;font-size:13px;font-weight:800;white-space:nowrap}
    .grid{display:grid;grid-template-columns:.95fr 1.05fr;gap:18px;align-items:start}
    .card{background:rgba(255,255,255,.92);border:1px solid rgba(226,232,240,.9);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;backdrop-filter:blur(8px)}
    .card h2{margin:0 0 16px;font-size:18px;letter-spacing:-.01em}
    .fixedbox,.drop{border-radius:18px;padding:16px;line-height:1.65}
    .fixedbox{border:1px solid #bfdbfe;background:linear-gradient(180deg,#eff6ff,#f8fbff)}
    .fixedbox strong,.drop strong{display:block;margin-bottom:4px;color:#1d4ed8}
    .drop{margin-top:12px;border:1.5px dashed #b9c6d8;background:#fbfdff;min-height:106px;display:flex;align-items:center;justify-content:space-between;gap:16px;transition:.18s ease}
    .drop:hover{border-color:var(--primary);background:#f8fbff}
    .drop small,.hint,footer{color:var(--muted)}
    input[type=file]{max-width:320px;color:#475467}
    .controls{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}
    label{display:block;margin-bottom:7px;font-size:13px;font-weight:800;color:#344054}
    input[type=date],select,input[type=text]{width:100%;border:1px solid #d0d5dd;border-radius:14px;padding:11px 12px;background:#fff;color:var(--text);font-size:14px;outline:none;transition:.15s ease}
    input[type=date]:focus,select:focus,input[type=text]:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(37,99,235,.10)}
    .actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}
    button{border:0;border-radius:14px;padding:12px 16px;font-weight:800;cursor:pointer;font-size:14px;transition:.15s ease}
    button:hover:not(:disabled){transform:translateY(-1px)}
    .btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;box-shadow:0 10px 20px rgba(37,99,235,.18)}
    .btn-secondary{background:#eef2f7;color:#344054}
    button:disabled{opacity:.45;cursor:not-allowed}
    .status{margin-top:14px;padding:13px 14px;border-radius:16px;background:#f8fafc;border:1px solid var(--line);color:#475467;line-height:1.65;white-space:pre-wrap}
    .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
    .kpi{border:1px solid var(--line);border-radius:18px;padding:14px;background:linear-gradient(180deg,#fff,#fafafa)}
    .kpi span{font-size:12px;color:var(--muted);font-weight:700}.kpi b{display:block;font-size:25px;margin-top:6px;letter-spacing:-.02em}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 14px}.tab{padding:9px 12px;border-radius:999px;background:#f1f5f9;color:#475467;cursor:pointer;font-weight:800;font-size:13px;user-select:none}.tab.active{background:#dbeafe;color:#1d4ed8}
    table{width:100%;border-collapse:separate;border-spacing:0;overflow:hidden;border:1px solid var(--line);border-radius:16px;background:white;font-size:13px}th,td{padding:11px 12px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{background:#f8fafc;color:#344054;font-size:12px;position:sticky;top:0;z-index:1}tr:last-child td{border-bottom:0}.ok{color:var(--ok);font-weight:800}.bad{color:var(--bad);font-weight:800}.warn{color:var(--warn);font-weight:800}.tablebox{max-height:470px;overflow:auto;border-radius:16px}
    .hint{font-size:12px;margin-top:10px;line-height:1.6;text-align:right}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.controls,.kpis{grid-template-columns:1fr 1fr}header{display:block}.pill{margin-top:12px}.drop{display:block}input[type=file]{margin-top:12px;max-width:100%}}
  </style>
</head>
<body>
<div class="wrap">
  <header><div><h1>水利计算课程设计考勤工具</h1><p>上传当天签到表，自动生成考勤 Excel。</p></div><div class="pill">固定名单已内置</div></header>
  <div class="grid">
    <section class="card"><h2>上传签到表</h2>
      <div class="fixedbox"><strong>固定总名单：已内置</strong><span>每天只需上传签到文件。</span></div>
      <div class="drop" style="margin-top:12px"><div><strong>当天签到表</strong><small>支持 .xlsx / .xls</small></div><input id="signFile" type="file" accept=".xlsx,.xls" /></div>
      <div class="controls"><div><label for="attDate">签到日期</label><input id="attDate" type="date" /></div><div><label for="session">场次</label><select id="session"><option value="上午">上午</option><option value="下午">下午</option></select></div><div><label for="markText">出勤标记</label><input id="markText" type="text" value="✓" maxlength="3" /></div></div>
      <div class="actions"><button class="btn-primary" id="runBtn">生成考勤表</button><button class="btn-secondary" id="downloadBtn" disabled>下载 Excel</button><button class="btn-secondary" id="resetBtn">清空当天签到和结果</button></div>
      <div id="status" class="status">请上传当天签到表。</div>
    </section>
    <section class="card"><h2>结果预览</h2><div class="kpis"><div class="kpi"><span>签到人数</span><b id="kSigned">0</b></div><div class="kpi"><span>成功匹配</span><b id="kMatched">0</b></div><div class="kpi"><span>未到人数</span><b id="kAbsent">0</b></div><div class="kpi"><span>异常签到</span><b id="kUnknown">0</b></div></div><div class="tabs"><div class="tab active" data-tab="summary">各班汇总</div><div class="tab" data-tab="absent">未到名单</div><div class="tab" data-tab="unknown">异常签到</div><div class="tab" data-tab="debug">定位检查</div></div><div class="tablebox"><table id="resultTable"><thead></thead><tbody></tbody></table></div></section>
  </div>
</div>

let signWorkbook=null, signFileName='', outputBlob=null, lastResult=null, activeTab='summary';
const $=id=>document.getElementById(id); const status=msg=>$('status').textContent=msg;
const norm=v=>{ if(v==null) return ''; let s=''; if(typeof v==='object'){ if(v.text!=null) s=String(v.text); else if(v.richText) s=v.richText.map(x=>x.text||'').join(''); else if(v.result!=null) s=String(v.result); else if(v.formula&&v.result!=null) s=String(v.result); else s=String(v); } else s=String(v); return s.normalize('NFKC').replace(/[\u00A0\u3000]/g,' ').trim(); };
// 学号统一只保留数字，解决 Excel 中文本/数字/带空格/带前缀引号等格式差异导致的误判。
const normId=v=>{ const s=norm(v).replace(/\.0$/,''); const digits=s.replace(/\D/g,''); return digits; };
// 姓名去除所有空白并做全角半角统一，解决签到表姓名中含空格时无法匹配的问题。
const normName=v=>norm(v).replace(/\s+/g,'');
const signKey=p=>p.id?`id:${p.id}`:`name:${p.nameKey||normName(p.name)}`;
const pad2=n=>String(n).padStart(2,'0');
function colLetter(n){ let s=''; while(n>0){ let m=(n-1)%26; s=String.fromCharCode(65+m)+s; n=Math.floor((n-1)/26); } return s; }
function safeDateKeyFromDate(d){ if(!(d instanceof Date)||isNaN(d)) return ''; return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
function excelSerialToDateKey(num){ const n=Number(num); if(!isFinite(n)) return ''; const utcDays=Math.floor(n-25569); const date=new Date(utcDays*86400*1000); return `${date.getUTCFullYear()}-${pad2(date.getUTCMonth()+1)}-${pad2(date.getUTCDate())}`; }
function dateKey(v){
  if(v==null||v==='') return '';
  if(v instanceof Date) return safeDateKeyFromDate(v);
  if(typeof v==='number') return excelSerialToDateKey(v);
  if(typeof v==='object') return dateKey(norm(v));
  const s=String(v).trim();
  let m=s.match(/(20\d{2})[-\/年.](\d{1,2})[-\/月.](\d{1,2})/); if(m) return `${m[1]}-${pad2(m[2])}-${pad2(m[3])}`;
  m=s.match(/(20\d{2})(\d{2})(\d{2})/); if(m) return `${m[1]}-${m[2]}-${m[3]}`;
  return '';
}
function inferDateFromFileName(name){ const s=name||''; let m=s.match(/(20\d{2})[-_年.]?(\d{2})[-_月.]?(\d{2})/); if(m) return `${m[1]}-${m[2]}-${m[3]}`; m=s.match(/(^|[^\d])(\d{2})(\d{2})(?=[^\d]|$)/); if(m){ const y=new Date().getFullYear(); return `${y}-${m[2]}-${m[3]}`; } return ''; }
function inferSessionFromText(text){ const s=String(text||''); if(/下午/.test(s)) return '下午'; if(/上午/.test(s)) return '上午'; const hm=s.match(/\b(\d{1,2}):(\d{2})\b/); if(hm) return Number(hm[1])<12?'上午':'下午'; return ''; }
function base64ToArrayBuffer(base64){ const bin=atob(base64); const bytes=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i); return bytes.buffer; }
async function readWorkbookFromFile(file){ const wb=new ExcelJS.Workbook(); await wb.xlsx.load(await file.arrayBuffer()); return wb; }
async function loadTemplateWorkbook(){ const wb=new ExcelJS.Workbook(); await wb.xlsx.load(base64ToArrayBuffer(FIXED_TEMPLATE_BASE64)); return wb; }
function worksheetRows(ws, maxRows=50){ const rows=[]; const n=Math.min(ws.rowCount||0,maxRows); for(let r=1;r<=n;r++){ const arr=[]; const row=ws.getRow(r); for(let c=1;c<=Math.max(ws.columnCount||0,row.cellCount||0);c++) arr[c]=row.getCell(c).value; rows[r]=arr; } return rows; }
function findHeader(rows){ let best={row:0,name:0,id:0,score:-1}; for(let r=1;r<rows.length;r++){ let name=0,id=0; const row=rows[r]||[]; for(let c=1;c<row.length;c++){ const s=norm(row[c]); if(s==='姓名') name=c; if(s==='学号') id=c; } const score=(name?1:0)+(id?1:0); if(score>best.score) best={row:r,name,id,score}; } return best; }
function getCellText(ws,r,c){ return norm(ws.getRow(r).getCell(c).value); }
function findDateCol(rows, headerRow){ const row=rows[headerRow]||[]; for(let c=1;c<row.length;c++){ if(/签到日期|日期|时间/.test(norm(row[c]))) return c; } return 0; }
function parseSignWorkbook(wb, fileName){
  const ws=wb.worksheets.find(s=>/签到数据|扫码签到/.test(s.name)) || wb.worksheets[0];
  if(!ws) throw new Error('签到文件没有工作表。');
  const rows=worksheetRows(ws, Math.min(ws.rowCount||200, 5000));
  const h=findHeader(rows); if(h.score<2) throw new Error('签到文件未找到“姓名”和“学号”列。');
  const people=[], seen=new Set();
  for(let r=h.row+1;r<=ws.rowCount;r++){
    const id=normId(ws.getRow(r).getCell(h.id).value);
    const rawName=norm(ws.getRow(r).getCell(h.name).value);
    const nameKey=normName(rawName);
    if(!id&&!nameKey) continue;
    const key=id?`id:${id}`:`name:${nameKey}`;
    if(seen.has(key)) continue;
    seen.add(key);
    people.push({id,name:rawName,nameKey,row:r,_key:key});
  }
  let autoDate='', autoSession='';
  const dateCol=findDateCol(rows,h.row); if(dateCol){ for(let r=h.row+1;r<=ws.rowCount;r++){ const d=dateKey(ws.getRow(r).getCell(dateCol).value); if(d){ autoDate=d; break; } } }
  const info=wb.worksheets.find(s=>/活动信息|信息/.test(s.name));
  if(info){ const vals=[]; info.eachRow(row=>row.eachCell({includeEmpty:false},cell=>vals.push(norm(cell.value)))); const joined=vals.join(' '); if(!autoDate){ const m=joined.match(/20\d{2}[-\/.年]\d{1,2}[-\/.月]\d{1,2}/); if(m) autoDate=dateKey(m[0]); } autoSession=inferSessionFromText(joined)||autoSession; }
  autoDate=autoDate||inferDateFromFileName(fileName); autoSession=autoSession||inferSessionFromText(fileName);
  return {people, autoDate, autoSession, sheetName:ws.name};
}
function findTargetColumn(ws, targetDate, session){
  const maxR=Math.min(ws.rowCount||10,10), maxC=ws.columnCount||20;
  for(let r=1;r<=maxR;r++){
    for(let c=1;c<=maxC;c++){
      const d=dateKey(ws.getRow(r).getCell(c).value);
      if(d!==targetDate) continue;
      for(let cc=c; cc<=Math.min(c+4,maxC); cc++){
        if(getCellText(ws,r+1,cc)===session) return cc;
      }
    }
  }
  return 0;
}
function isLikelyStudentId(id){ return /^\d{6,}$/.test(normId(id)); }
function isLikelyStudentName(name){
  const s=normName(name);
  if(!s) return false;
  if(['姓名','学号','序号','班级','专业','考勤','签到','状态'].includes(s)) return false;
  if(/序号|学号|姓名|班级|考勤表|签到表/.test(s)) return false;
  if(/^\d+$/.test(s)) return false;
  return true;
}
function readRosterSheet(ws){
  let headerRow=0, seqCol=0, idCol=0, nameCol=0;
  const maxR=Math.min(ws.rowCount||0,20), maxC=ws.columnCount||20;
  for(let r=1;r<=maxR;r++){
    let rid=0,rname=0,rseq=0;
    for(let c=1;c<=maxC;c++){
      const s=getCellText(ws,r,c);
      if(s==='序号') rseq=c;
      if(s==='学号') rid=c;
      if(s==='姓名') rname=c;
    }
    if(rid&&rname){ headerRow=r; seqCol=rseq; idCol=rid; nameCol=rname; break; }
  }
  const students=[]; if(!idCol||!nameCol) return {students};
  for(let r=headerRow+1;r<=ws.rowCount;r++){
    const row=ws.getRow(r);
    const id=normId(row.getCell(idCol).value);
    const name=norm(row.getCell(nameCol).value);
    const nameKey=normName(name);
    const seq=seqCol?norm(row.getCell(seqCol).value):'';
    // 只把真正的学生行加入名单：学号必须是 6 位以上数字，姓名不能是“姓名/学号/序号”等表头文字。
    // 这样可以过滤掉模板里重复出现的表头行，避免网页“未到名单”出现非人名。
    if(!isLikelyStudentId(id) || !isLikelyStudentName(name)) continue;
    students.push({row:r,seq,id,name,nameKey});
  }
  return {students,idCol,nameCol,seqCol};
}
function centerCell(cell){ cell.alignment=Object.assign({}, cell.alignment||{}, {horizontal:'center', vertical:'middle'}); }
function markPresent(cell, mark){ cell.value=mark; centerCell(cell); cell.font=Object.assign({}, cell.font||{}, {bold:true}); }
function markAbsent(cell){ cell.value=null; centerCell(cell); }
async function process(){
  if(!signWorkbook) throw new Error('请先上传当天签到文件。');
  const targetDate=$('attDate').value, session=$('session').value, mark=$('markText').value||'✓'; if(!targetDate) throw new Error('请设置签到日期。');
  const rosterWb=await loadTemplateWorkbook(); const sign=parseSignWorkbook(signWorkbook, signFileName);
  const signById=new Map(), signByName=new Map(); sign.people.forEach(p=>{ if(p.id) signById.set(p.id,p); if(p.nameKey) signByName.set(p.nameKey,p); });
  const matchedSignKeys=new Set(), allRosterIds=new Set(), allRosterNames=new Set(), summary=[], absent=[], debug=[]; let matched=0,totalRoster=0, missing=[];
  rosterWb.worksheets.forEach(ws=>{
    const col=findTargetColumn(ws,targetDate,session), roster=readRosterSheet(ws); if(!roster.students.length) return;
    roster.students.forEach(st=>{ if(st.id) allRosterIds.add(st.id); if(st.nameKey) allRosterNames.add(st.nameKey); });
    debug.push({sheetName:ws.name,target:`${targetDate} ${session}`, column:col?colLetter(col):'未找到'});
    if(!col){ missing.push(ws.name); return; }
    let classTotal=0,classPresent=0;
    roster.students.forEach(st=>{
      classTotal++; totalRoster++;
      const hit=(st.id&&signById.get(st.id))||(st.nameKey&&signByName.get(st.nameKey));
      const cell=ws.getRow(st.row).getCell(col);
      if(hit){ markPresent(cell,mark); classPresent++; matched++; matchedSignKeys.add(hit._key||signKey(hit)); }
      else { markAbsent(cell); absent.push({sheetName:ws.name,seq:st.seq,id:st.id,name:st.name,row:st.row,column:colLetter(col)}); }
    });
    summary.push({sheetName:ws.name,total:classTotal,present:classPresent,absent:classTotal-classPresent,rate:classTotal?Math.round(classPresent/classTotal*10000)/100+'%':'-'});
  });
  // “异常签到”的定义调整为：签到人不在固定总名单中。只要学号或清洗后的姓名能在总名单中找到，就不再算异常。
  const unknown=sign.people.filter(p=>!(p.id&&allRosterIds.has(p.id)) && !(p.nameKey&&allRosterNames.has(p.nameKey)));
  if(missing.length) throw new Error(`以下 Sheet 未找到 ${targetDate} ${session} 对应列：${missing.join('、')}。请检查日期/场次。`);
  const buf=await rosterWb.xlsx.writeBuffer(); outputBlob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  lastResult={summary,absent,unknown,debug,signed:sign.people.length,matched,totalRoster,targetDate,session}; return lastResult;
}
function renderTable(){ const thead=$('resultTable').querySelector('thead'), tbody=$('resultTable').querySelector('tbody'); thead.innerHTML=''; tbody.innerHTML=''; if(!lastResult){ thead.innerHTML='<tr><th>提示</th></tr>'; tbody.innerHTML='<tr><td>暂无结果</td></tr>'; return; } let rows=[],heads=[]; if(activeTab==='summary'){ heads=['班级/Sheet','应到','出勤','未到','出勤率']; rows=lastResult.summary.map(x=>[x.sheetName,x.total,`<span class="ok">${x.present}</span>`,`<span class="bad">${x.absent}</span>`,x.rate]); } else if(activeTab==='absent'){ heads=['班级/Sheet','序号','学号','姓名','Excel位置','状态']; rows=lastResult.absent.map(x=>[x.sheetName,x.seq,x.id,x.name,`${x.column}${x.row}`,'<span class="bad">未到</span>']); if(!rows.length) rows=[['-','-','-','-','-','<span class="ok">无人未到</span>']]; } else if(activeTab==='unknown'){ heads=['学号','姓名','签到文件行号','说明']; rows=lastResult.unknown.map(x=>[x.id,x.name,x.row,'<span class="warn">固定名单未找到</span>']); if(!rows.length) rows=[['-','-','-','<span class="ok">无异常</span>']]; } else { heads=['班级/Sheet','目标','写入列','说明']; rows=lastResult.debug.map(x=>[x.sheetName,x.target,x.column,x.column==='未找到'?'<span class="bad">未定位</span>':'<span class="ok">已定位</span>']); } thead.innerHTML=`<tr>${heads.map(h=>`<th>${h}</th>`).join('')}</tr>`; tbody.innerHTML=rows.map(r=>`<tr>${r.map(c=>`<td>${c??''}</td>`).join('')}</tr>`).join(''); }
function renderKpis(){ const r=lastResult||{signed:0,matched:0,absent:[],unknown:[]}; $('kSigned').textContent=r.signed||0; $('kMatched').textContent=r.matched||0; $('kAbsent').textContent=r.absent?.length||0; $('kUnknown').textContent=r.unknown?.length||0; }
$('signFile').addEventListener('change', async e=>{ try{ const file=e.target.files[0]; if(!file) return; signFileName=file.name||''; status('正在读取签到文件……'); signWorkbook=await readWorkbookFromFile(file); const info=parseSignWorkbook(signWorkbook, signFileName); if(info.autoDate) $('attDate').value=info.autoDate; if(info.autoSession) $('session').value=info.autoSession; outputBlob=null; lastResult=null; $('downloadBtn').disabled=true; renderKpis(); renderTable(); status(`签到文件已读取：${info.sheetName}\n自动识别：${info.autoDate||'未识别日期'} ${info.autoSession||'未识别场次'}，签到人数 ${info.people.length}。\n请点击“生成考勤表”。`); }catch(err){ status('签到文件读取失败：'+err.message); } });
$('runBtn').addEventListener('click', async()=>{ try{ $('runBtn').disabled=true; status('正在对比并生成 Excel……'); const r=await process(); renderKpis(); renderTable(); $('downloadBtn').disabled=false; const dbg=r.debug.map(x=>`${x.sheetName}: ${x.column}列`).join('；'); status(`处理完成：${r.targetDate} ${r.session}\n签到 ${r.signed} 人，成功匹配 ${r.matched} 人，未到 ${r.absent.length} 人，异常签到 ${r.unknown.length} 条。\n写入列检查：${dbg}\n未到名单已在网页显示，导出 Excel 不再对未到单元格标红；已过滤非学生表头行，并修复姓名/学号格式差异导致的异常误判。`); }catch(err){ status('处理失败：'+err.message); } finally { $('runBtn').disabled=false; } });
$('downloadBtn').addEventListener('click',()=>{ if(!outputBlob) return; const a=document.createElement('a'); a.href=URL.createObjectURL(outputBlob); const d=$('attDate').value.replaceAll('-',''); a.download=`水利计算课程设计考勤表_${d}_${$('session').value}.xlsx`; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),5000); });
function resetCurrentRun(){
  signWorkbook=null;
  signFileName='';
  outputBlob=null;
  lastResult=null;
  activeTab='summary';
  const fileInput=$('signFile');
  if(fileInput) fileInput.value='';
  $('downloadBtn').disabled=true;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  const firstTab=document.querySelector('.tab[data-tab="summary"]');
  if(firstTab) firstTab.classList.add('active');
  renderKpis();
  renderTable();
  status('已清空当天签到文件和生成结果。固定总名单仍保留，请重新上传当天扫码签到 Excel 文件。');
}
$('resetBtn').addEventListener('click', resetCurrentRun); document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{ document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); t.classList.add('active'); activeTab=t.dataset.tab; renderTable(); }));
(function init(){ renderTable(); status('固定总名单已内置。请上传当天签到表。'); })();
</script>
</body>
</html>
